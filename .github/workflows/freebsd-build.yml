name: FreeBSD Build

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build robert on FreeBSD
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build in FreeBSD VM
        uses: vmactions/freebsd-vm@v1
        with:
          usesh: true
          prepare: |
            pkg install -y ca_root_nss curl git gmake rubygem-rake mbedtls3
          run: |
            if [ ! -d ../mruby ]; then
              git clone --depth 1 https://github.com/mruby/mruby ../mruby
            fi
            ruby --version
            freebsd-version
            make test
            make static
            file bin/robert

      - name: Rename binary for latest release
        if: github.ref_type == 'branch'
        run: cp bin/robert bin/robert-latest

      - name: Publish latest release
        if: github.ref_type == 'branch'
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          artifactErrorsFailBuild: true
          artifacts: bin/robert-latest
          name: Latest
          tag: latest
          body: |
            Automated FreeBSD build of `robert` from the latest `main` commit.

      - name: Publish tagged release
        if: github.ref_type == 'tag'
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          artifactErrorsFailBuild: true
          artifacts: bin/robert
          name: ${{ github.ref_name }}
          tag: ${{ github.ref_name }}
          body: |
            FreeBSD build of `robert` version ${{ github.ref_name }}.
